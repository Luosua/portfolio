{{ if .Site.Data.homepage.services.enable }}
{{ $servicesPage := .Site.GetPage "/services" }}
<section id="services" class="section rad-animation-group section--border-bottom">
  <div class="container rad-fade-down">
    <div class="row">
      <div class="col-12">
        {{ with $servicesPage }}
        <h2>{{ .Title }}</h2>
        <div class="services-content">
          {{ .Content }}
        </div>
        {{ end }}
      </div>
    </div>
  </div>
</section>
{{ end }}
