## Homepage about
- id: "about_title"
  translation: "Who am I?"

- id: "about_content"
  translation: |
    <p class="lead"> I am an AI developer with over ten years of programming experience and more than six years designing
    and implementing AI systems in business-critical contexts. I have contributed to intelligent solutions across domains such as finance, industrial workflows
    and customer-facing platforms — from retrieval-augmented chatbots and multimodal assistants to fraud detection and decision-support systems.
    </p>
    <p class="lead">
    I approach every project with a strong architectural mindset and a clear focus on usability.
    I develop solutions with the end user in mind — ensuring that complexity stays in the architecture, not in the experience.
    Too often, technically impressive tools create friction because logic is inconsistent or workflows are poorly thought through.
    I translate complex requirements into structured system designs, question inconsistencies early
    and shape solutions that feel intuitive because they are built on clear principles.</p>
    <p class="lead">
    At the core of my work is a commitment to clarity and structure.
    Sustainable systems are not driven by trends but by clear thinking and transparent design choices.
    My goal is to build intelligent solutions that are not only technically sound,
    but intuitive, coherent and practical in real-world use. I value precision, reliability and open communication — because trust,
    in technology as in collaboration, starts with clarity.</p>

