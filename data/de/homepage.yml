showcase:
  subtitle: "Starke Systeme<br>beginnen mit klarem Denken"
  description: |
    <p class="lead">
    Ich bin Alona Liuzniak, KI-Entwicklerin. Ich konzipiere und entwickle intelligente Systeme, bei denen die Architektur bewusst gestaltet ist, die Logik konsistent bleibt und Benutzerfreundlichkeit von Anfang an mitgedacht wird.
    </p>

about:
  content: |
    <p class="lead"> Ich bin KI-Entwicklerin mit über zehn Jahren Programmiererfahrung und mehr als sechs Jahren Erfahrung in der Konzeption und Umsetzung von KI-Systemen in geschäftskritischen Anwendungen.
    Ich habe intelligente Lösungen in verschiedenen Bereichen entwickelt – darunter Finanzsysteme, industrielle Workflows und kundennahe Plattformen.
    Dazu gehören unter anderem Retrieval-Augmented-Chatbots, multimodale Assistenten, Lösungen zur Betrugserkennung und Systeme zur Entscheidungsunterstützung.
    </p>
    <p class="lead">
    Bei meiner Arbeit lege ich großen Wert auf eine saubere Architektur und Benutzerfreundlichkeit.
    Ich entwickle Lösungen konsequent aus der Perspektive der Endnutzer, sodass die Komplexität in der Architektur bleibt und nicht in der Anwendung.
    Zu oft entstehen technisch beeindruckende Tools, die im Alltag trotzdem schwer zu nutzen sind, weil Logik und Workflows nicht ausreichend durchdacht sind.
    Deshalb übersetze ich komplexe Anforderungen in klare Systemstrukturen, spreche Inkonsistenzen frühzeitig an und entwickle Lösungen,
    die sich intuitiv anfühlen, weil sie auf klaren Prinzipien basieren.</p>
    <p class="lead">
    Im Mittelpunkt meiner Arbeit stehen Klarheit und Struktur. Starke Systeme entstehen nicht aus Trends, sondern aus durchdachten Entscheidungen.
    Mein Ziel ist es, intelligente Lösungen zu entwickeln, die technisch solide, verständlich, konsistent und praxistauglich sind.
     Präzision, Zuverlässigkeit und offene Kommunikation sind mir dabei besonders wichtig – denn Vertrauen, in Technologie wie in der Zusammenarbeit, beginnt mit Klarheit.</p>

