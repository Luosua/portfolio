# services
services:
  enable: true
  what_i_do:
    - header: "AI System Architecture & Pipeline Design"
      icon: "images/diagram.svg"
      text: "I design modular and scalable AI systems — from data ingestion to inference and deployment — with clear structure, maintainability and integration into existing environments."
    - header: "Retrieval-Augmented Generation (RAG) & Knowledge Systems"
      icon: "images/book.svg"
      text: "I design and optimize RAG pipelines, search architectures and knowledge integration strategies to improve answer quality, contextual grounding and consistency."
    - header: "Workflow Automation & Intelligent Tooling"
      icon: "images/automation.svg"
      text: "I build AI-powered tools that reduce manual effort while increasing consistency and quality."
    - header: "Human-Centered AI"
      icon: "images/target.svg"
      text: "I design intelligent systems with clear logic and intuitive interaction, ensuring they are structured, predictable and easy to use."
    - header: "Transparent AI System Design"
      icon: "images/smile.svg"
      text: "I embed transparency, explainability and responsible AI mechanisms into intelligent systems to ensure traceability and trust."
  how_we_work:
    - header: "One-Time Consultation"
      text: "Get a clear, expert perspective on your challenge. In a focused session, we analyze your system, uncover hidden issues and identify concrete next steps to move forward with confidence."
    - header: "Focused Problem Sprint"
      text: "Tackle a specific challenge with speed and precision. In a short, intensive collaboration, we break down the problem, design a clear solution and define an actionable path to implementation."
    - header: "Long-Term Product Support"
      text: "Strengthen your product as it evolves. I work alongside your team to refine architecture, improve system logic and ensure your AI or digital product remains clear, robust and scalable."
  what_you_gain:
    - header: "Clarity in Your Ideas"
      icon: "images/visibility.svg"
      bullets:
        - "Clear product concepts shaped for execution"
        - "Architectures grounded in logical consistency"
        - "Requirements translated into actionable structure"
    - header: "Simpler, Stronger Workflows"
      icon: "images/workflow.svg"
      bullets:
        - "Intuitive flows users adopt naturally"
        - "Consistent decision logic across your system"
        - "Lean structures that improve performance"
    - header: "AI That Makes Sense"
      icon: "images/trusted.svg"
      bullets:
        - "Reliable AI outputs designed for real-world use"
        - "Stable RAG and decision architectures"
        - "Intelligent features users trust"

