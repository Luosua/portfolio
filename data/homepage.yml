# services
services:
  enable: true
  what_i_do:
    - header: "AI System Architecture & Pipeline Design"
      icon: "images/diagram.svg"
      text: "Designing modular, scalable AI systems — from data ingestion to inference and deployment — with clear structure, maintainability, and integration into existing environments."
    - header: "Retrieval-Augmented Generation (RAG) & Knowledge Systems"
      icon: "images/book.svg"
      text: "Designing and optimizing RAG pipelines, search architectures, and knowledge integration strategies to improve answer quality, contextual grounding, and consistency."
    - header: "Human-Centered AI & Responsible AI Implementation"
      icon: "images/loupe.svg"
      text: "Embedding transparency, explainability, and responsible AI mechanisms into intelligent systems to ensure traceability, trust, and user-aligned behavior."
    - header: "Workflow Automation & Intelligent Tooling"
      icon: "images/automation.svg"
      text: "Building AI-powered tools that automate validation, decision support, and internal processes — reducing manual effort while increasing consistency and quality."
    - header: "Multimodal & Integrated AI Solutions"
      icon: "images/generative.svg"
      text: "Designing systems that combine text, structured data, images, and enterprise communication channels into coherent, interoperable AI-driven workflows."
  how_we_work:
    - header: "One-Time Consultation"
      text: "description"
    - header: "Focused Problem Sprint"
      text: "description"
    - header: "Long-Term Product Support"
      text: "description"
  what_you_gain:
    - header: "Clarity in Your Ideas"
      icon: "images/visibility.svg"
      bullets:
        - "Well-structured product and AI concepts"
        - "Logically consistent system design"
        - "Clear, implementable requirements"
    - header: "Simpler, Stronger Workflows"
      icon: "images/workflow.svg"
      bullets:
        - "Intuitive product flows"
        - "Clean decision logic"
        - "Reduced complexity with maintained performance"
    - header: "AI That Makes Sense"
      icon: "images/target.svg"
      bullets:
        - "Structured, reliable AI outputs"
        - "Robust RAG and decision architectures"
        - "Practical, user-aligned AI solutions"

